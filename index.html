<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>হোয়াইটবোর্ড</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', 'Hind Siliguri', sans-serif;
    background: #eef1f5;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Toolbar */
  .toolbar {
    background: #1e293b;
    color: #fff;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    z-index: 10;
  }
  .toolbar h1 {
    font-size: 16px;
    margin: 0 12px 0 0;
    font-weight: 600;
    white-space: nowrap;
  }
  .tool-group {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #29374d;
    padding: 6px 10px;
    border-radius: 8px;
  }
  .tool-btn {
    background: transparent;
    border: none;
    color: #cbd5e1;
    cursor: pointer;
    font-size: 18px;
    padding: 6px 9px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.15s;
  }
  .tool-btn:hover { background: #3b4a63; color: #fff; }
  .tool-btn.active { background: #3b82f6; color: #fff; }
  input[type="color"] {
    width: 34px; height: 34px;
    border: none; border-radius: 6px;
    cursor: pointer; background: none; padding: 0;
  }
  input[type="range"] { width: 80px; cursor: pointer; }
  .size-label {
    font-size: 12px; color: #cbd5e1; min-width: 26px; text-align: center;
  }
  select {
    background: #29374d;
    color: #fff;
    border: none;
    padding: 6px 8px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
  }
  .action-btn {
    background: #334155;
    color: #fff;
    border: none;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    display: flex; align-items: center; gap: 6px;
    transition: 0.15s;
  }
  .action-btn:hover { background: #475569; }
  .action-btn.danger:hover { background: #b91c1c; }
  .action-btn.primary { background: #2563eb; }
  .action-btn.primary:hover { background: #1d4ed8; }

  /* Canvas area */
  .canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #fff;
  }
  canvas {
    position: absolute;
    top: 0; left: 0;
    touch-action: none;
    cursor: crosshair;
  }
  .text-input-box {
    position: absolute;
    border: 2px dashed #3b82f6;
    background: rgba(59,130,246,0.05);
    outline: none;
    resize: none;
    font-family: 'Hind Siliguri', sans-serif;
    padding: 4px;
    min-width: 60px;
    min-height: 24px;
    line-height: 1.3;
    z-index: 5;
  }
  .hint {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(30,41,59,0.85);
    color: #fff;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    pointer-events: none;
    opacity: 0.9;
    transition: opacity 0.3s;
  }
</style>
</head>
<body>

<div class="toolbar">
  <h1>🖊️ হোয়াইটবোর্ড</h1>

  <div class="tool-group">
    <button class="tool-btn active" data-tool="pen" title="পেন">✏️</button>
    <button class="tool-btn" data-tool="eraser" title="ইরেজার">🧽</button>
    <button class="tool-btn" data-tool="text" title="টেক্সট">🔤</button>
    <button class="tool-btn" data-tool="line" title="সরলরেখা">📏</button>
    <button class="tool-btn" data-tool="rect" title="আয়তক্ষেত্র">▭</button>
    <button class="tool-btn" data-tool="circle" title="বৃত্ত">⬤</button>
  </div>

  <div class="tool-group">
    <input type="color" id="colorPicker" value="#1e293b" title="রঙ">
    <input type="range" id="sizeRange" min="1" max="40" value="4">
    <span class="size-label" id="sizeLabel">4</span>
  </div>

  <div class="tool-group">
    <select id="fontSize" title="ফন্ট সাইজ">
      <option value="14">14</option>
      <option value="18" selected>18</option>
      <option value="24">24</option>
      <option value="32">32</option>
      <option value="48">48</option>
    </select>
  </div>

  <button class="action-btn" id="undoBtn" title="Undo">↩️ Undo</button>
  <button class="action-btn danger" id="clearBtn" title="সব মুছুন">🗑️ সব মুছুন</button>
  <button class="action-btn primary" id="downloadBtn" title="ছবি ডাউনলোড">⬇️ ডাউনলোড</button>
</div>

<div class="canvas-wrap" id="canvasWrap">
  <canvas id="board"></canvas>
  <div class="hint" id="hint">টেক্সট টুল বেছে বোর্ডে ক্লিক করো লেখার জন্য</div>
</div>

<script>
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvasWrap');
const hint = document.getElementById('hint');

let tool = 'pen';
let color = '#1e293b';
let size = 4;
let fontSize = 18;
let drawing = false;
let startX = 0, startY = 0;
let snapshot = null;
let history = [];

function resizeCanvas() {
  const rect = wrap.getBoundingClientRect();
  const temp = document.createElement('canvas');
  temp.width = canvas.width; temp.height = canvas.height;
  const tctx = temp.getContext('2d');
  if (canvas.width && canvas.height) tctx.drawImage(canvas, 0, 0);

  canvas.width = rect.width;
  canvas.height = rect.height;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  if (temp.width && temp.height) ctx.drawImage(temp, 0, 0);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function saveHistory() {
  history.push(canvas.toDataURL());
  if (history.length > 30) history.shift();
}
saveHistory();

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  if (e.touches && e.touches.length) {
    return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
  }
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function startDraw(e) {
  if (tool === 'text') return; // handled separately on click
  e.preventDefault();
  drawing = true;
  const pos = getPos(e);
  startX = pos.x; startY = pos.y;

  if (tool === 'pen' || tool === 'eraser') {
    ctx.beginPath();
    ctx.moveTo(startX, startY);
  } else {
    snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
  }
}

function moveDraw(e) {
  if (!drawing) return;
  e.preventDefault();
  const pos = getPos(e);

  if (tool === 'pen' || tool === 'eraser') {
    ctx.lineTo(pos.x, pos.y);
    ctx.strokeStyle = tool === 'eraser' ? '#ffffff' : color;
    ctx.lineWidth = tool === 'eraser' ? size * 3 : size;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.stroke();
  } else if (tool === 'line' || tool === 'rect' || tool === 'circle') {
    ctx.putImageData(snapshot, 0, 0);
    ctx.strokeStyle = color;
    ctx.lineWidth = size;
    ctx.lineCap = 'round';
    ctx.beginPath();
    if (tool === 'line') {
      ctx.moveTo(startX, startY);
      ctx.lineTo(pos.x, pos.y);
    } else if (tool === 'rect') {
      ctx.rect(startX, startY, pos.x - startX, pos.y - startY);
    } else if (tool === 'circle') {
      const r = Math.hypot(pos.x - startX, pos.y - startY);
      ctx.arc(startX, startY, r, 0, Math.PI * 2);
    }
    ctx.stroke();
  }
}

function endDraw(e) {
  if (!drawing) return;
  drawing = false;
  saveHistory();
}

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', moveDraw);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('mouseleave', endDraw);
canvas.addEventListener('touchstart', startDraw, { passive: false });
canvas.addEventListener('touchmove', moveDraw, { passive: false });
canvas.addEventListener('touchend', endDraw);

// Text tool
canvas.addEventListener('click', (e) => {
  if (tool !== 'text') return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const box = document.createElement('textarea');
  box.className = 'text-input-box';
  box.style.left = x + 'px';
  box.style.top = y + 'px';
  box.style.color = color;
  box.style.fontSize = fontSize + 'px';
  wrap.appendChild(box);
  box.focus();

  function commit() {
    const text = box.value;
    if (text.trim()) {
      ctx.fillStyle = color;
      ctx.font = fontSize + 'px "Hind Siliguri", sans-serif';
      ctx.textBaseline = 'top';
      const lines = text.split('\n');
      lines.forEach((line, i) => {
        ctx.fillText(line, x + 4, y + 4 + i * (fontSize * 1.3));
      });
      saveHistory();
    }
    if (box.parentNode) wrap.removeChild(box);
  }

  box.addEventListener('blur', commit);
  box.addEventListener('keydown', (ev) => {
    if (ev.key === 'Escape') { box.value = ''; box.blur(); }
  });
});

// Toolbar interactions
document.querySelectorAll('.tool-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    tool = btn.dataset.tool;
    canvas.style.cursor = tool === 'text' ? 'text' : 'crosshair';
    hint.style.opacity = tool === 'text' ? '0.9' : '0';
  });
});

document.getElementById('colorPicker').addEventListener('input', (e) => {
  color = e.target.value;
});
document.getElementById('sizeRange').addEventListener('input', (e) => {
  size = parseInt(e.target.value);
  document.getElementById('sizeLabel').textContent = size;
});
document.getElementById('fontSize').addEventListener('change', (e) => {
  fontSize = parseInt(e.target.value);
});

document.getElementById('clearBtn').addEventListener('click', () => {
  if (confirm('সত্যিই পুরো বোর্ড মুছে ফেলতে চাও?')) {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    saveHistory();
  }
});

document.getElementById('undoBtn').addEventListener('click', () => {
  if (history.length > 1) {
    history.pop();
    const img = new Image();
    img.src = history[history.length - 1];
    img.onload = () => {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0);
    };
  }
});

document.getElementById('downloadBtn').addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = 'whiteboard.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
});

setTimeout(() => { hint.style.opacity = '0'; }, 4000);
</script>

</body>
</html>
