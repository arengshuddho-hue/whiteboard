<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learn with Pinky — হোয়াইটবোর্ড</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', 'Hind Siliguri', sans-serif;
    background: #eef1f5;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Brand header */
  .brand {
    background: linear-gradient(90deg, #1e293b, #0f172a);
    color: #fff;
    padding: 10px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 17px;
    letter-spacing: 0.3px;
  }
  .brand .sub {
    font-weight: 400;
    font-size: 13px;
    color: #93c5fd;
    margin-left: 6px;
  }

  /* Toolbar */
  .toolbar {
    background: #1e293b;
    color: #fff;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    z-index: 10;
  }
  .tool-group {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #29374d;
    padding: 6px 10px;
    border-radius: 8px;
  }
  .tool-btn {
    background: transparent;
    border: none;
    color: #cbd5e1;
    cursor: pointer;
    font-size: 18px;
    padding: 6px 9px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.15s;
  }
  .tool-btn:hover { background: #3b4a63; color: #fff; }
  .tool-btn.active { background: #3b82f6; color: #fff; }
  input[type="color"] {
    width: 34px; height: 34px;
    border: none; border-radius: 6px;
    cursor: pointer; background: none; padding: 0;
  }
  input[type="range"] { width: 80px; cursor: pointer; }
  .size-label {
    font-size: 12px; color: #cbd5e1; min-width: 26px; text-align: center;
  }
  select {
    background: #29374d;
    color: #fff;
    border: none;
    padding: 6px 8px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
  }
  .action-btn {
    background: #334155;
    color: #fff;
    border: none;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    display: flex; align-items: center; gap: 6px;
    transition: 0.15s;
  }
  .action-btn:hover { background: #475569; }
  .action-btn.danger:hover { background: #b91c1c; }
  .action-btn.primary { background: #2563eb; }
  .action-btn.primary:hover { background: #1d4ed8; }

  /* Canvas area */
  .canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #fff;
  }
  canvas {
    position: absolute;
    top: 0; left: 0;
    touch-action: none;
    cursor: crosshair;
  }

  /* Draggable text boxes */
  .text-box {
    position: absolute;
    min-width: 40px;
    min-height: 20px;
    padding: 4px 8px;
    outline: none;
    cursor: move;
    line-height: 1.3;
    font-family: 'Hind Siliguri', sans-serif;
    white-space: pre-wrap;
    word-break: break-word;
    border: 1px dashed transparent;
    z-index: 5;
    user-select: none;
  }
  .text-box:hover {
    border-color: #3b82f6;
  }
  .text-box.editing {
    cursor: text;
    border-color: #3b82f6;
    background: rgba(59,130,246,0.06);
    user-select: text;
  }
  .text-box .del-btn {
    position: absolute;
    top: -12px;
    right: -12px;
    width: 22px;
    height: 22px;
    background: #ef4444;
    color: #fff;
    border-radius: 50%;
    border: none;
    font-size: 13px;
    line-height: 22px;
    text-align: center;
    cursor: pointer;
    display: none;
    padding: 0;
  }
  .text-box:hover .del-btn,
  .text-box.editing .del-btn {
    display: block;
  }

  .hint {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(30,41,59,0.85);
    color: #fff;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    pointer-events: none;
    opacity: 0.9;
    transition: opacity 0.3s;
    z-index: 6;
  }
</style>
</head>
<body>

<div class="brand">
  📚 Learn with Pinky <span class="sub">Study Smart. Achieve More.</span>
</div>

<div class="toolbar">
  <div class="tool-group">
    <button class="tool-btn active" data-tool="pen" title="আঁকো">✏️</button>
    <button class="tool-btn" data-tool="eraser" title="মুছো">🧽</button>
    <button class="tool-btn" data-tool="text" title="লেখো">🔤</button>
    <button class="tool-btn" data-tool="line" title="সোজা লাইন">📏</button>
    <button class="tool-btn" data-tool="rect" title="চারকোণা">▭</button>
    <button class="tool-btn" data-tool="circle" title="গোল">⬤</button>
  </div>

  <div class="tool-group">
    <input type="color" id="colorPicker" value="#1e293b" title="রঙ">
    <input type="range" id="sizeRange" min="1" max="40" value="4">
    <span class="size-label" id="sizeLabel">4</span>
  </div>

  <div class="tool-group">
    <select id="fontSize" title="Font Size">
      <option value="14">14</option>
      <option value="18" selected>18</option>
      <option value="24">24</option>
      <option value="32">32</option>
      <option value="48">48</option>
    </select>
  </div>

  <button class="action-btn" id="undoBtn" title="আগেরটায় ফিরে যাও">↩️ undo</button>
  <button class="action-btn danger" id="clearBtn" title="সব মুছে ফেলো">🗑️ CLear</button>
  <button class="action-btn primary" id="downloadBtn" title="ছবি হিসেবে সেভ করো">⬇️ Download</button>
</div>

<div class="canvas-wrap" id="canvasWrap">
  <canvas id="board"></canvas>
  <div class="hint" id="hint">লেখা বসাতে: 🔤 বাটনে ক্লিক করো, তারপর বোর্ডে ক্লিক করো</div>
  <div class="hint" id="shiftHint" style="bottom: 44px; background: rgba(37,99,235,0.9);">মাউস ছাড়া আঁকতে: Shift চেপে ধরে একে একে ক্লিক করো, লাইন এমনিতেই জোড়া লাগবে</div>
</div>

<script>
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvasWrap');
const hint = document.getElementById('hint');

let tool = 'pen';
let color = '#1e293b';
let size = 4;
let fontSize = 18;
let drawing = false;
let startX = 0, startY = 0;
let snapshot = null;
let history = [];

function resizeCanvas() {
  const rect = wrap.getBoundingClientRect();
  const temp = document.createElement('canvas');
  temp.width = canvas.width; temp.height = canvas.height;
  const tctx = temp.getContext('2d');
  if (canvas.width && canvas.height) tctx.drawImage(canvas, 0, 0);

  canvas.width = rect.width;
  canvas.height = rect.height;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  if (temp.width && temp.height) ctx.drawImage(temp, 0, 0);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function saveHistory() {
  history.push(canvas.toDataURL());
  if (history.length > 30) history.shift();
}
saveHistory();

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  if (e.touches && e.touches.length) {
    return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
  }
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

let shiftLastPoint = null; // for shift+click point-to-point drawing

function startDraw(e) {
  if (tool === 'text') return;
  if (e.target !== canvas) return;
  if (e.shiftKey) return; // shift+click is handled separately (no drag needed)
  e.preventDefault();
  drawing = true;
  const pos = getPos(e);
  startX = pos.x; startY = pos.y;

  if (tool === 'pen' || tool === 'eraser') {
    ctx.beginPath();
    ctx.moveTo(startX, startY);
  } else {
    snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
  }
}

function moveDraw(e) {
  if (!drawing) return;
  e.preventDefault();
  const pos = getPos(e);

  if (tool === 'pen' || tool === 'eraser') {
    ctx.lineTo(pos.x, pos.y);
    ctx.strokeStyle = tool === 'eraser' ? '#ffffff' : color;
    ctx.lineWidth = tool === 'eraser' ? size * 3 : size;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.stroke();
  } else if (tool === 'line' || tool === 'rect' || tool === 'circle') {
    ctx.putImageData(snapshot, 0, 0);
    ctx.strokeStyle = color;
    ctx.lineWidth = size;
    ctx.lineCap = 'round';
    ctx.beginPath();
    if (tool === 'line') {
      ctx.moveTo(startX, startY);
      ctx.lineTo(pos.x, pos.y);
    } else if (tool === 'rect') {
      ctx.rect(startX, startY, pos.x - startX, pos.y - startY);
    } else if (tool === 'circle') {
      const r = Math.hypot(pos.x - startX, pos.y - startY);
      ctx.arc(startX, startY, r, 0, Math.PI * 2);
    }
    ctx.stroke();
  }
}

function endDraw(e) {
  if (!drawing) return;
  drawing = false;
  saveHistory();
}

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', moveDraw);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('mouseleave', endDraw);
canvas.addEventListener('touchstart', startDraw, { passive: false });
canvas.addEventListener('touchmove', moveDraw, { passive: false });
canvas.addEventListener('touchend', endDraw);

/* ---------- Draggable Text Boxes ---------- */
let zTop = 100;

function createTextBox(x, y, text = '') {
  const box = document.createElement('div');
  box.className = 'text-box';
  box.contentEditable = 'false';
  box.style.left = x + 'px';
  box.style.top = y + 'px';
  box.style.color = color;
  box.style.fontSize = fontSize + 'px';
  box.style.zIndex = ++zTop;
  box.innerText = text || 'এখানে লেখো';

  const delBtn = document.createElement('button');
  delBtn.className = 'del-btn';
  delBtn.innerHTML = '✕';
  delBtn.title = 'মুছো';
  delBtn.addEventListener('mousedown', (e) => e.stopPropagation());
  delBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    box.remove();
  });
  box.appendChild(delBtn);

  wrap.appendChild(box);
  enableDrag(box);
  enableEdit(box);

  // auto-focus for editing right away
  setTimeout(() => enterEditMode(box), 0);

  return box;
}

function enterEditMode(box) {
  box.classList.add('editing');
  box.contentEditable = 'true';
  box.style.zIndex = ++zTop;
  // select placeholder text
  if (box.innerText.trim() === 'এখানে লেখো') {
    box.innerText = '';
  }
  box.focus();
  placeCaretAtEnd(box);
}

function placeCaretAtEnd(el) {
  const range = document.createRange();
  range.selectNodeContents(el);
  range.collapse(false);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
}

function enableEdit(box) {
  box.addEventListener('dblclick', (e) => {
    e.stopPropagation();
    enterEditMode(box);
  });
  box.addEventListener('blur', () => {
    box.classList.remove('editing');
    box.contentEditable = 'false';
    if (box.innerText.trim() === '') {
      box.remove();
    } else {
      // strip stray del button text if any leaked into innerText
      const delBtnRef = box.querySelector('.del-btn');
      if (!delBtnRef) {
        const newDel = document.createElement('button');
        newDel.className = 'del-btn';
        newDel.innerHTML = '✕';
        newDel.addEventListener('mousedown', (e) => e.stopPropagation());
        newDel.addEventListener('click', (e) => { e.stopPropagation(); box.remove(); });
        box.appendChild(newDel);
      }
    }
  });
  box.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      box.blur();
    }
  });
}

function enableDrag(box) {
  let offsetX = 0, offsetY = 0, isDragging = false;

  function onDown(e) {
    if (box.classList.contains('editing')) return;
    if (e.target.classList.contains('del-btn')) return;
    e.preventDefault();
    isDragging = true;
    box.style.zIndex = ++zTop;
    const rect = box.getBoundingClientRect();
    const wrapRect = wrap.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    offsetX = clientX - rect.left;
    offsetY = clientY - rect.top;
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend', onUp);
  }

  function onMove(e) {
    if (!isDragging) return;
    e.preventDefault();
    const wrapRect = wrap.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    let newX = clientX - wrapRect.left - offsetX;
    let newY = clientY - wrapRect.top - offsetY;
    newX = Math.max(0, Math.min(newX, wrap.clientWidth - box.offsetWidth));
    newY = Math.max(0, Math.min(newY, wrap.clientHeight - box.offsetHeight));
    box.style.left = newX + 'px';
    box.style.top = newY + 'px';
  }

  function onUp() {
    isDragging = false;
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onUp);
  }

  box.addEventListener('mousedown', onDown);
  box.addEventListener('touchstart', onDown, { passive: false });
}

canvas.addEventListener('click', (e) => {
  // Text tool: click places a draggable text box (unaffected by shift)
  if (tool === 'text') {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    createTextBox(x, y);
    return;
  }

  // Not holding Shift: reset the point-chain, do nothing else here
  if (!e.shiftKey) {
    shiftLastPoint = null;
    return;
  }

  // Shift+Click: place a point, connect to the previous point with a line/erase-dot.
  // This lets someone draw without a mouse — just click point after point.
  const pos = getPos(e);

  if (tool === 'eraser') {
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, (size * 3) / 2, 0, Math.PI * 2);
    ctx.fill();
    if (shiftLastPoint) {
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = size * 3;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(shiftLastPoint.x, shiftLastPoint.y);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
    }
  } else {
    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.lineWidth = size;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    if (shiftLastPoint) {
      ctx.beginPath();
      ctx.moveTo(shiftLastPoint.x, shiftLastPoint.y);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
    } else {
      // first point in the chain: draw a dot so a single click is visible
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, size / 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  shiftLastPoint = pos;
  saveHistory();
});

// Double-click while Shift-drawing a chain: closes the shape back to the first point
canvas.addEventListener('dblclick', (e) => {
  if (tool === 'text') return;
  shiftLastPoint = null; // ends the current point-chain
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') shiftLastPoint = null; // start a fresh chain
});

/* ---------- Toolbar interactions ---------- */
document.querySelectorAll('.tool-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    tool = btn.dataset.tool;
    canvas.style.cursor = tool === 'text' ? 'text' : 'crosshair';
    hint.style.opacity = tool === 'text' ? '0.9' : '0';
    shiftLastPoint = null; // reset point-chain when switching tools
  });
});

document.getElementById('colorPicker').addEventListener('input', (e) => {
  color = e.target.value;
});
document.getElementById('sizeRange').addEventListener('input', (e) => {
  size = parseInt(e.target.value);
  document.getElementById('sizeLabel').textContent = size;
});
document.getElementById('fontSize').addEventListener('change', (e) => {
  fontSize = parseInt(e.target.value);
});

document.getElementById('clearBtn').addEventListener('click', () => {
  if (confirm('সব মুছে দিতে চাও? (আঁকা আর লেখা সব চলে যাবে)')) {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    saveHistory();
    document.querySelectorAll('.text-box').forEach(b => b.remove());
  }
});

document.getElementById('undoBtn').addEventListener('click', () => {
  if (history.length > 1) {
    history.pop();
    const img = new Image();
    img.src = history[history.length - 1];
    img.onload = () => {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0);
    };
  }
});

/* ---------- Download: merge canvas + text boxes into one PNG ---------- */
document.getElementById('downloadBtn').addEventListener('click', () => {
  const exportCanvas = document.createElement('canvas');
  exportCanvas.width = canvas.width;
  exportCanvas.height = canvas.height;
  const ectx = exportCanvas.getContext('2d');
  ectx.fillStyle = '#ffffff';
  ectx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);
  ectx.drawImage(canvas, 0, 0);

  const wrapRect = wrap.getBoundingClientRect();
  document.querySelectorAll('.text-box').forEach(box => {
    const rect = box.getBoundingClientRect();
    const x = rect.left - wrapRect.left;
    const y = rect.top - wrapRect.top;
    const style = window.getComputedStyle(box);
    const fs = parseInt(style.fontSize);
    ectx.fillStyle = box.style.color || '#1e293b';
    ectx.font = fs + 'px "Hind Siliguri", sans-serif';
    ectx.textBaseline = 'top';
    const text = box.innerText.replace('✕', '').trim();
    const lines = text.split('\n');
    lines.forEach((line, i) => {
      ectx.fillText(line, x + 8, y + 4 + i * (fs * 1.3));
    });
  });

  const link = document.createElement('a');
  link.download = 'learn-with-pinky-whiteboard.png';
  link.href = exportCanvas.toDataURL('image/png');
  link.click();
});

setTimeout(() => { hint.style.opacity = '0'; }, 5000);
setTimeout(() => { document.getElementById('shiftHint').style.opacity = '0'; }, 7000);
</script>

</body>
</html>
